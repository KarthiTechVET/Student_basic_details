  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

;\">*<\u002Fspan><\u002Flabel>\n            <input name=\"fatherName\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"Your answer\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Father's Occupation<\u002Flabel>\n            <input name=\"fatherOccupation\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"Your answer\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Mother's Name <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <input name=\"motherName\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"Your answer\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Mother's Occupation<\u002Flabel>\n            <input name=\"motherOccupation\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"Your answer\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Parent Mobile <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <input name=\"parentMobile\" onchange=\"{{ onChange }}\" type=\"tel\" placeholder=\"10-digit mobile number\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Parent Email<\u002Flabel>\n            <input name=\"parentEmail\" onchange=\"{{ onChange }}\" type=\"email\" placeholder=\"parent@example.com\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Annual Family Income<\u002Flabel>\n            <input name=\"annualFamilyIncome\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"e.g. ₹2,50,000\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Category <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <select name=\"category\" onchange=\"{{ onChange }}\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;color:#3c4043;\">\n              <option value=\"\">Choose<\u002Foption>\n              <option>OC<\u002Foption><option>BC<\u002Foption><option>MBC<\u002Foption><option>SC<\u002Foption><option>ST<\u002Foption><option>Others<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Emergency Contact <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <input name=\"emergencyContact\" onchange=\"{{ onChange }}\" type=\"tel\" placeholder=\"10-digit mobile number\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Relationship <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <input name=\"relationship\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"e.g. Uncle, Elder Sister\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Section C -->\n      <div style=\"background: #ffffff; border-radius: 8px; box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); padding: 28px 32px; box-sizing: border-box;\">\n        <div style=\"font-size: 20px; font-weight: 500; color: #202124; margin-bottom: 20px;\">C. School Background<\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 24px 28px;\">\n\n          <div style=\"display:flex;flex-direction:column;gap:8px;grid-column:1 / -1;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Name of School <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <input name=\"schoolName\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"Your answer\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:8px;grid-column:1 / -1;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Board of Study <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <div style=\"display:flex;gap:24px;flex-wrap:wrap;\">\n              <label style=\"display:flex;align-items:center;gap:8px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"boardOfStudy\" value=\"State\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">State<\u002Flabel>\n              <label style=\"display:flex;align-items:center;gap:8px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"boardOfStudy\" value=\"CBSE\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">CBSE<\u002Flabel>\n              <label style=\"display:flex;align-items:center;gap:8px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"boardOfStudy\" value=\"ICSE\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">ICSE<\u002Flabel>\n              <label style=\"display:flex;align-items:center;gap:8px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"boardOfStudy\" value=\"Others\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Others<\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Year of Passing <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <input name=\"yearOfPassing\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"e.g. 2026\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Higher Secondary Percentage (%) <span style=\"color:#d93025;\">*<\u002Fspan><\u002Flabel>\n            <input name=\"hscPercentage\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"e.g. 87.5\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Mathematics Marks<\u002Flabel>\n            <input name=\"mathematicsMarks\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"Your answer\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-size:14px;color:#3c4043;\">Computer Science / Informatics Marks<\u002Flabel>\n            <input name=\"csMarks\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"Your answer\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Section D -->\n      <div style=\"background: #ffffff; border-radius: 8px; box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); padding: 28px 32px; box-sizing: border-box;\">\n        <div style=\"font-size: 20px; font-weight: 500; color: #202124; margin-bottom: 20px;\">D. Medium of Study<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <label style=\"display:flex;align-items:center;gap:8px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"mediumOfStudy\" value=\"Tamil\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Tamil<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:8px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"mediumOfStudy\" value=\"English\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">English<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:8px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"mediumOfStudy\" value=\"Bilingual\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Bilingual<\u002Flabel>\n          <div style=\"display:flex;align-items:center;gap:8px;\">\n            <label style=\"display:flex;align-items:center;gap:8px;font-size:15px;color:#3c4043;white-space:nowrap;\"><input type=\"radio\" name=\"mediumOfStudy\" value=\"Other\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Other:<\u002Flabel>\n            <input name=\"mediumOfStudyOther\" onchange=\"{{ onChange }}\" type=\"text\" placeholder=\"Please specify\" style=\"border:none;border-bottom:1px solid #dadce0;padding:6px 4px;font-size:15px;outline:none;background:transparent;flex:1;max-width:280px;\" style-focus=\"border-bottom:2px solid #1F3864;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Section E -->\n      <div style=\"background: #ffffff; border-radius: 8px; box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); padding: 28px 32px; box-sizing: border-box;\">\n        <div style=\"font-size: 20px; font-weight: 500; color: #202124; margin-bottom: 6px;\">E. Computer Exposure<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #5f6368; margin-bottom: 16px;\">Select all that apply.<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"checkbox\" name=\"computerExposure\" value=\"I have my own Laptop\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">I have my own Laptop<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"checkbox\" name=\"computerExposure\" value=\"I have my own Desktop\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">I have my own Desktop<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"checkbox\" name=\"computerExposure\" value=\"I have regular Internet access\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">I have regular Internet access<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"checkbox\" name=\"computerExposure\" value=\"I know basic MS Office\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">I know basic MS Office<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"checkbox\" name=\"computerExposure\" value=\"I have written simple programs before\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">I have written simple programs before<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"checkbox\" name=\"computerExposure\" value=\"I have completed an online certification\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">I have completed an online certification<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"checkbox\" name=\"computerExposure\" value=\"I have no previous computer programming experience\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">I have no previous computer programming experience<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Section F -->\n      <div style=\"background: #ffffff; border-radius: 8px; box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); padding: 28px 32px; box-sizing: border-box;\">\n        <div style=\"font-size: 20px; font-weight: 500; color: #202124; margin-bottom: 6px;\">F. Career Goal<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #5f6368; margin-bottom: 16px;\">Choose one.<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom: 24px;\">\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"careerGoal\" value=\"Software Developer\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Software Developer<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"careerGoal\" value=\"Data Scientist\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Data Scientist<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"careerGoal\" value=\"AI Engineer\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">AI Engineer<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"careerGoal\" value=\"Cyber Security Professional\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Cyber Security Professional<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"careerGoal\" value=\"Entrepreneur\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Entrepreneur<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"careerGoal\" value=\"Higher Studies\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Higher Studies<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"careerGoal\" value=\"Government Services\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Government Services<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:#3c4043;\"><input type=\"radio\" name=\"careerGoal\" value=\"Not Yet Decided\" onchange=\"{{ onChange }}\" style=\"width:18px;height:18px;accentColor:#1F3864;\">Not Yet Decided<\u002Flabel>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <label style=\"font-size:14px;color:#3c4043;\">My Career Goal (Brief)<\u002Flabel>\n          <textarea name=\"careerGoalBrief\" onchange=\"{{ onChange }}\" rows=\"3\" placeholder=\"Your answer\" style=\"border:none;border-bottom:1px solid #dadce0;padding:8px 4px;font-size:15px;outline:none;background:transparent;resize:vertical;font-family:inherit;\" style-focus=\"border-bottom:2px solid #1F3864;\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Submit -->\n      <div style=\"display:flex;flex-direction:column;gap:8px;padding: 8px 4px;\">\n        <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size: 13px; color: #d93025;\">Something went wrong submitting your response. Please try again.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n          <button onclick=\"{{ onSubmit }}\" disabled=\"{{ submitting }}\" style=\"background: #1F3864; color: #ffffff; border: none; border-radius: 4px; padding: 12px 28px; font-size: 15px; font-weight: 500; cursor: pointer;\" style-hover=\"background: #16294a;\">{{ submitLabel }}<\u002Fbutton>\n          <div style=\"font-size: 13px; color: #5f6368;\">VET Institute of Arts and Science · Thindal, Erode<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\n// Paste your Google Apps Script Web App URL below (looks like\n// https://script.google.com/macros/s/XXXXXXXX/exec). Submissions will be\n// appended as rows to the Google Sheet the script is bound to.\nconst FORM_ENDPOINT = 'https://script.google.com/macros/s/AKfycbx068nAY9Vqod9sfKY1NshoQreKEqwA9O4IcZUdtNjEYeXZAnt6u2jLAOciQXdkdiVD8g/exec';\n\nclass Component extends DCLogic {\n  state = { d: {}, submitted: false, submitting: false, error: false };\n\n  handleChange = (e) => {\n    const { name, type, value, checked } = e.target;\n    if (type === 'checkbox') {\n      this.setState((s) => {\n        const current = s.d[name] || [];\n        const next = checked ? [...current, value] : current.filter((v) => v !== value);\n        return { d: { ...s.d, [name]: next } };\n      });\n    } else {\n      this.setState((s) => ({ d: { ...s.d, [name]: value } }));\n    }\n  };\n\n  handleSubmit = async () => {\n    if (!FORM_ENDPOINT) {\n      // No backend configured yet — just show the confirmation screen.\n      this.setState({ submitted: true, error: false });\n      window.scrollTo({ top: 0, behavior: 'smooth' });\n      return;\n    }\n    this.setState({ submitting: true, error: false });\n    try {\n      // Google Apps Script web apps don't send CORS headers, so we fire the\n      // request in no-cors mode (text/plain avoids a blocked preflight) and\n      // treat a resolved fetch as success — we can't read the response body.\n      await fetch(FORM_ENDPOINT, {\n        method: 'POST',\n        mode: 'no-cors',\n        headers: { 'Content-Type': 'text/plain;charset=utf-8' },\n        body: JSON.stringify(this.state.d),\n      });\n      this.setState({ submitted: true, submitting: false });\n      window.scrollTo({ top: 0, behavior: 'smooth' });\n    } catch (err) {\n      this.setState({ submitting: false, error: true });\n    }\n  };\n\n  handleEditAgain = () => {\n    this.setState({ submitted: false, d: {} });\n  };\n\n  renderVals() {\n    return {\n      d: this.state.d,\n      onChange: this.handleChange,\n      onSubmit: this.handleSubmit,\n      onEditAgain: this.handleEditAgain,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      submitting: this.state.submitting,\n      submitLabel: this.state.submitting ? 'Submitting…' : 'Submit',\n      error: this.state.error,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
